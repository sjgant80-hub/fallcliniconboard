<style>

*{margin:0;padding:0;box-sizing:border-box}

.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}

th,td{padding:7px 10px;border-bottom:1px solid var(--line-soft);text-align:left;vertical-align:top}

.chat{display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;padding:6px}
.msg{padding:10px 14px;border-radius:6px;max-width:88%;font-size:13px;line-height:1.55;white-space:pre-wrap}

.chat-input{display:flex;gap:8px;margin-top:10px}
.chat-input input{flex:1;padding:11px 14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:18px;z-index:900;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:4px;padding:22px;max-width:700px;width:100%;max-height:90vh;overflow:auto}
.modal h2{font-family:var(--serif);font-size:17px;margin-bottom:14px}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brass);color:var(--void);padding:9px 18px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all 0.22s;z-index:1100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.allergy-list{list-style:none}
.allergy-list li{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px dashed var(--line-soft);font-size:13px}
.allergy-list li .sev{font-family:var(--mono);font-size:10px}
@media(max-width:760px){nav.tabs button{padding:0 11px;font-size:11px}main{padding:14px 14px 50px}.row,.row3{grid-template-columns:1fr}.wizard-steps{flex-wrap:wrap}}
</style>

<script>

(function (root) {
  'use strict';

  const FALL_KIT_VERSION = '1.2.0';
  const KCC_MINT_URL = 'https://sjgant80-hub.github.io/kcc-mint/';

  // ─── Model registry ──────────────────────────────────────────────
  const WEBLLM_MODELS = {
    'llama-1b':  { id: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',   size: '~700MB', label: '1B · fast · any laptop / phone' },
    'llama-3b':  { id: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',   size: '~2GB',   label: '3B · balanced · default · most laptops' },
    'qwen-7b':   { id: 'Qwen2.5-7B-Instruct-q4f16_1-MLC',     size: '~5GB',   label: '7B · capable · needs decent GPU (M-series Mac / 8GB+ VRAM)' },
    'llama-8b':  { id: 'Llama-3.1-8B-Instruct-q4f16_1-MLC',   size: '~5GB',   label: '8B · common · needs decent GPU' },
    'llama-70b': { id: 'Llama-3.1-70B-Instruct-q4f16_1-MLC',  size: '~40GB',  label: '70B · frontier · needs serious GPU + 64GB+ RAM' },
  };
  const DEFAULT_MODEL = 'llama-3b';

  const T3_PROVIDERS = {
    anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-5','claude-opus-4-7','claude-haiku-4-5'], default: 'claude-sonnet-4-5', url: 'https://api.anthropic.com/v1/messages' },
    openai:    { label: 'OpenAI',           models: ['gpt-4o','gpt-4o-mini','o1-mini'],                          default: 'gpt-4o-mini',      url: 'https://api.openai.com/v1/chat/completions' },
    google:    { label: 'Google Gemini',    models: ['gemini-1.5-pro','gemini-1.5-flash','gemini-2.0-flash-exp'], default: 'gemini-1.5-flash', url: 'https://generativelanguage.googleapis.com/v1beta/models/' },
  };

  // ─── State ───────────────────────────────────────────────────────
  const STATE = {
    config: loadConfig(),
    ai: { ready: false, loading: false, progress: 0, engine: null, model: null },
    mesh: { active: false, peers: new Map(), bc: null, signal: null },
  };

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('fall-kit.config') || '{}'); }
    catch (e) { return {}; }
  }
  function saveConfig() {
    try { localStorage.setItem('fall-kit.config', JSON.stringify(STATE.config)); } catch (e) {}
  }

  // ─── DOM helpers ─────────────────────────────────────────────────
  function $(s, root) { return (root || document).querySelector(s); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ─── AI tier ─────────────────────────────────────────────────────
  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

  // ─── WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN) ───
  const MESH_CHANNEL = 'fall-signal';
  const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  function meshStart(opts) {
    if (STATE.mesh.active) return;
    opts = opts || {};
    const seedId = opts.seedId || (location.pathname + '#' + Math.random().toString(36).slice(2, 8));
    STATE.mesh.seedId = seedId;
    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }
    catch (e) { console.warn('fall-kit: BroadcastChannel unavailable'); return; }
    STATE.mesh.bc.onmessage = e => {
      const m = e.data;
      if (!m || !m.kind || m.peerId === seedId) return;
      if (opts.onMessage) opts.onMessage(m);
    };
    STATE.mesh.bc.postMessage({ kind: 'fall-kit:hello', peerId: seedId, ts: Date.now(), seedName: opts.seedName || 'unknown' });
    STATE.mesh.active = true;
    notify('Mesh active · channel ' + MESH_CHANNEL, 'ok');
  }
  function meshPost(kind, payload) {
    if (!STATE.mesh.active || !STATE.mesh.bc) return false;
    STATE.mesh.bc.postMessage({ kind: kind, peerId: STATE.mesh.seedId, ts: Date.now(), payload: payload });
    return true;
  }

  // ─── Toast ───────────────────────────────────────────────────────
  function notify(msg, kind) {
    let t = $('#fk-toast');
    if (!t) {
      t = document.createElement('div'); t.id = 'fk-toast';
      t.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);background:#c08a3a;color:#0a0a0a;padding:9px 18px;border-radius:3px;font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;opacity:0;transition:all .22s;z-index:10000;pointer-events:none';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.background = kind === 'err' ? '#a14a2a' : kind === 'ok' ? '#6b8d4a' : '#c08a3a';
    t.style.color = kind === 'err' ? '#fff' : '#0a0a0a';
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(t._to);
    t._to = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(20px)'; }, 2400);
  }

  // ─── Settings modal ──────────────────────────────────────────────
  function openSettings() {
    let bg = $('#fk-modal-bg');
    if (!bg) {
      bg = document.createElement('div'); bg.id = 'fk-modal-bg';
      bg.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:flex-start;justify-content:center;padding:60px 16px;overflow-y:auto;z-index:9999';
      bg.onclick = e => { if (e.target.id === 'fk-modal-bg') closeSettings(); };
      document.body.appendChild(bg);
    }
    const tier = aiTier();
    const provider = STATE.config.api_provider || 'anthropic';
    const providerCfg = T3_PROVIDERS[provider];
    bg.innerHTML = `
      <div style="background:#13121a;border:1px solid #c08a3a;border-radius:5px;max-width:600px;width:100%;padding:22px 24px;color:#ebe3d2;font-family:system-ui,-apple-system,sans-serif;font-size:13.5px;line-height:1.55">
        <h3 style="font-family:Georgia,serif;font-size:18px;color:#c08a3a;margin-bottom:14px">◊ Fall Kit · AI cascade settings</h3>
        <div style="margin-bottom:14px"><label style="display:block;font-size:11px;color:#a89e88;letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase">Tier</label>
          <select id="fk-tier" style="width:100%;padding:8px 11px;background:#1a1922;border:1px solid #3a342c;color:#ebe3d2;border-radius:3px;font-size:13.5px;font-family:inherit">

            <option value="T3"${tier==='T3'?' selected':''}>T3 · BYOK · Anthropic / OpenAI / Google · stored in your browser only</option>
          </select>
        </div>
        <div id="fk-t2-block" style="display:${tier==='T2'?'block':'none'};margin-bottom:14px;padding:12px 14px;background:#1a1922;border:1px solid #2a2934;border-radius:4px">
          <label style="display:block;font-size:11px;color:#a89e88;letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase">WebLLM model · 1B → 70B cascade</label>
          <select id="fk-model" style="width:100%;padding:8px 11px;background:#22212c;border:1px solid #3a342c;color:#ebe3d2;border-radius:3px;font-size:13px;font-family:inherit">
            ${Object.entries(WEBLLM_MODELS).map(([k,m]) => `<option value="${k}"${(STATE.config.webllm_model||DEFAULT_MODEL)===k?' selected':''}>${esc(m.label)} · ${esc(m.size)}</option>`).join('')}
          </select>
          <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <button id="fk-load-llm" style="padding:7px 14px;background:#c08a3a;color:#0a0a0a;border:none;border-radius:3px;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit">${STATE.ai.ready?'✓ Loaded · switch':'Load model (one-time download)'}</button>
            <span id="fk-llm-status" style="font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#a89e88;letter-spacing:.04em">${STATE.ai.ready?'ready':STATE.ai.loading?Math.round(STATE.ai.progress)+'%':'not loaded'}</span>
          </div>
          <div style="margin-top:8px;font-size:11px;color:#6e6a5e;line-height:1.55">First load downloads the model from @mlc-ai/web-llm CDN. Cached forever after. Inference is 100% local — open DevTools → Network during use, nothing leaves.</div>
        </div>
        <div id="fk-t3-block" style="display:${tier==='T3'?'block':'none'};margin-bottom:14px;padding:12px 14px;background:#1a1922;border:1px solid #2a2934;border-radius:4px">
          <label style="display:block;font-size:11px;color:#a89e88;letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase">BYOK provider</label>
          <select id="fk-provider" style="width:100%;padding:8px 11px;background:#22212c;border:1px solid #3a342c;color:#ebe3d2;border-radius:3px;font-size:13px;font-family:inherit;margin-bottom:10px">
            ${Object.entries(T3_PROVIDERS).map(([k,p]) => `<option value="${k}"${provider===k?' selected':''}>${esc(p.label)}</option>`).join('')}
          </select>
          <label style="display:block;font-size:11px;color:#a89e88;letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase">Model</label>
          <select id="fk-api-model" style="width:100%;padding:8px 11px;background:#22212c;border:1px solid #3a342c;color:#ebe3d2;border-radius:3px;font-size:13px;font-family:inherit;margin-bottom:10px">
            ${providerCfg.models.map(m => `<option value="${m}"${(STATE.config.api_model||providerCfg.default)===m?' selected':''}>${esc(m)}</option>`).join('')}
          </select>
          <label style="display:block;font-size:11px;color:#a89e88;letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase">API key</label>
          <input type="password" id="fk-key" value="${esc(STATE.config.api_key || '')}" placeholder="${STATE.config.api_key ? '(set · leave empty to keep)' : 'sk-ant-... or sk-... or AIza...'}" autocomplete="off" style="width:100%;padding:8px 11px;background:#22212c;border:1px solid #3a342c;color:#ebe3d2;border-radius:3px;font-size:13px;font-family:ui-monospace,Menlo,monospace">
          <div style="margin-top:8px;font-size:11px;color:#6e6a5e;line-height:1.55">Key lives in this browser only (localStorage). Sent direct to the provider — never to us. Wipe with Reset.</div>
        </div>
        <div style="margin-bottom:14px;padding:12px 14px;background:#1a1922;border:1px solid #2a2934;border-radius:4px">
          <label style="display:block;font-size:11px;color:#a89e88;letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase">Cross-seed mesh</label>
          <div style="display:flex;gap:8px;align-items:center">
            <button id="fk-mesh-toggle" style="padding:6px 12px;background:${STATE.mesh.active?'#6b8d4a':'#1a1922'};color:${STATE.mesh.active?'#fff':'#a89e88'};border:1px solid ${STATE.mesh.active?'#6b8d4a':'#3a342c'};border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit">${STATE.mesh.active?'✓ Active · disconnect':'Activate mesh'}</button>
            <span style="font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#6e6a5e;letter-spacing:.04em">channel · <code style="background:#22212c;padding:1px 5px;border-radius:2px">${MESH_CHANNEL}</code></span>
          </div>
          <div style="margin-top:8px;font-size:11px;color:#6e6a5e;line-height:1.55">BroadcastChannel for same-device · WebRTC for cross-device (planned). Other estate seeds on the same channel discover each other automatically.</div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
          <button onclick="FallKit.closeSettings()" style="padding:7px 14px;background:transparent;color:#a89e88;border:1px solid #3a342c;border-radius:3px;font-size:12px;cursor:pointer;font-family:inherit">Close</button>
          <button id="fk-save" style="padding:7px 14px;background:#c08a3a;color:#0a0a0a;border:none;border-radius:3px;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit">Save</button>
        </div>
        <div style="margin-top:14px;font-family:ui-monospace,Menlo,monospace;font-size:9px;color:#6e6a5e;letter-spacing:.08em;text-align:center">◊ Fall Kit v${FALL_KIT_VERSION} · MIT · ai-nativesolutions.com · ◊·κ=1</div>
      </div>`;
    // Wire interactions
    $('#fk-tier').onchange = () => {
      const t = $('#fk-tier').value;
      $('#fk-t2-block').style.display = t === 'T2' ? 'block' : 'none';
      $('#fk-t3-block').style.display = t === 'T3' ? 'block' : 'none';
    };
    $('#fk-provider') && ($('#fk-provider').onchange = () => {
      const p = $('#fk-provider').value;
      const sel = $('#fk-api-model');
      sel.innerHTML = T3_PROVIDERS[p].models.map(m => `<option value="${m}">${esc(m)}</option>`).join('');
    });
    $('#fk-load-llm') && ($('#fk-load-llm').onclick = () => {
      const m = $('#fk-model').value;
      loadWebLLM(m);
    });
    $('#fk-mesh-toggle').onclick = () => {
      if (STATE.mesh.active) { STATE.mesh.bc?.close(); STATE.mesh.active = false; STATE.mesh.bc = null; notify('Mesh disconnected'); }
      else meshStart({ seedName: STATE.config.seedName || 'seed' });
      openSettings();  // refresh modal
    };
    $('#fk-save').onclick = () => {
      STATE.config.ai_tier = $('#fk-tier').value;
      if ($('#fk-model')) STATE.config.webllm_model = $('#fk-model').value;
      if ($('#fk-provider')) STATE.config.api_provider = $('#fk-provider').value;
      if ($('#fk-api-model')) STATE.config.api_model = $('#fk-api-model').value;
      const newKey = $('#fk-key')?.value;
      if (newKey) STATE.config.api_key = newKey;
      saveConfig(); renderAiChip(); notify('Saved', 'ok'); closeSettings();
    };
  }
  function closeSettings() { const bg = $('#fk-modal-bg'); if (bg) bg.remove(); }

  // ─── Help section (returns HTML string for inclusion in seed Help tabs) ───
  function helpSection() {
    return `<div style="background:rgba(192,138,58,.05);border:1px solid #3a342c;border-radius:4px;padding:18px 22px;margin:14px 0">
      <h4 style="font-family:Georgia,serif;font-size:15px;color:#c08a3a;margin-bottom:12px">◊ AI cascade · the 3 tiers</h4>
      <p style="font-size:13px;color:#a89e88;line-height:1.7;margin-bottom:10px">This seed runs fully without AI (<strong style="color:#c08a3a">T0</strong>, default). Enable a tier in settings if you want AI-assist features:</p>
      <table style="width:100%;border-collapse:collapse;font-size:12.5px">
        <thead><tr><th style="padding:6px 10px;text-align:left;background:rgba(0,0,0,.2);font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#a89e88;letter-spacing:.08em;text-transform:uppercase">Tier</th><th style="padding:6px 10px;text-align:left;background:rgba(0,0,0,.2);font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#a89e88;letter-spacing:.08em;text-transform:uppercase">What it is</th></tr></thead>
        <tbody>
          <tr><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#c08a3a;font-weight:600">T0</td><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#a89e88">Off. The seed works fully. No AI · no downloads · no API calls.</td></tr>
          <tr><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#c08a3a;font-weight:600">T2</td><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#a89e88">WebLLM in-browser. Pick a model: 1B (700MB, fast) → 3B (2GB, balanced) → 7B (5GB, capable) → 70B (40GB, frontier). One-time download, runs offline forever after. Zero data leaves your device.</td></tr>
          <tr><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#c08a3a;font-weight:600">T3</td><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#a89e88">BYOK · Anthropic Claude · OpenAI GPT · Google Gemini. You bring the API key, you pay the provider direct. Key stays in your browser, sent direct to the provider, never proxied.</td></tr>
        </tbody>
      </table>
      <p style="font-size:12px;color:#6e6a5e;line-height:1.6;margin-top:10px">Open the AI chip in the header to switch tier or check status. Cross-seed mesh activates a BroadcastChannel on <code style="background:#1a1922;padding:1px 5px;border-radius:2px">${MESH_CHANNEL}</code> so other estate seeds on the same device discover this one.</p>
    </div>`;
  }

  // ─── CSS for AI chip ─────────────────────────────────────────────
  function injectCss() {
    if (document.getElementById('fk-css')) return;
    const s = document.createElement('style');
    s.id = 'fk-css';
    s.textContent = `
      #fk-ai-chip { display:inline-flex; align-items:center; gap:6px; padding:4px 9px; border-radius:3px; font-family:ui-monospace,Menlo,monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; font-weight:600; cursor:pointer; border:1px solid #3a342c; background:#1a1922; color:#a89e88; user-select:none; vertical-align:middle }
      #fk-ai-chip:hover { border-color:#c08a3a; color:#ebe3d2 }
      #fk-ai-chip.fk-chip-live { border-color:#6b8d4a; color:#6b8d4a; background:rgba(107,141,74,.10) }
      #fk-ai-chip.fk-chip-loading { border-color:#e8a83a; color:#e8a83a; background:rgba(232,168,58,.10) }
      #fk-ai-chip.fk-chip-warn { border-color:#a14a2a; color:#a14a2a; background:rgba(161,74,42,.08) }
      #fk-ai-chip .fk-dot { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0 }
      #fk-ai-chip.fk-chip-loading .fk-dot { animation:fk-pulse 1s infinite }
      @keyframes fk-pulse { 0%,100%{opacity:1}50%{opacity:.3} }
      .fk-ai-assist { display:inline-flex; align-items:center; gap:5px; padding:4px 9px; font-size:11px; border:1px solid #c08a3a; color:#c08a3a; background:transparent; border-radius:3px; cursor:pointer; font-family:inherit }
      .fk-ai-assist:hover { background:#c08a3a; color:#0a0a0a }
      .fk-ai-assist::before { content:'✦'; font-size:12px }
    `;
    document.head.appendChild(s);
  }

  // ─── KCC Mint launcher (v1.2 · fork-this-seed shortcut) ──────────
  function openMint() {
    const slug = (STATE.config.seedName || location.hostname.split('.')[0] || 'seed').replace(/[^a-z0-9-]/gi, '-').toLowerCase();
    const name = document.title.replace(/^[◊·\s]+/, '').split('·')[0].trim() || slug;
    const url = location.href.split('?')[0].split('#')[0];
    const desc = document.querySelector('meta[name="description"]')?.content?.slice(0, 200) || '';
    const params = new URLSearchParams({ fork: '1', parent_slug: slug, parent_name: name, parent_url: url, parent_desc: desc });
    window.open(KCC_MINT_URL + '?' + params.toString(), '_blank', 'noopener');
  }

  // ─── Init ────────────────────────────────────────────────────────
  function init(opts) {
    opts = opts || {};
    injectCss();
    if (opts.seedName) STATE.config.seedName = opts.seedName;
    if ($('#fk-ai-chip')) { renderAiChip(); return { version: FALL_KIT_VERSION, mounted: false }; }
    const chip = document.createElement('button');
    chip.id = 'fk-ai-chip';
    chip.title = 'AI cascade · click to configure tier and model';
    chip.innerHTML = '<span class="fk-dot"></span><span id="fk-ai-chip-text">T0 · off</span>';
    chip.onclick = openSettings;
    // Try anchor first, fall back to floating bottom-right
    const anchor = opts.chipAnchor ? $(opts.chipAnchor) : null;
    if (anchor) { anchor.appendChild(chip); }
    else {
      chip.style.cssText += ';position:fixed;bottom:14px;left:14px;z-index:9998;box-shadow:0 4px 14px rgba(0,0,0,.4)';
      document.body.appendChild(chip);
    }
    // v1.2 · floating mint button next to chip
    if (!$('#fk-mint-btn') && !opts.hideMint) {
      const mintBtn = document.createElement('button');
      mintBtn.id = 'fk-mint-btn';
      mintBtn.title = 'Mint a fork of this seed as a KCC bundle · provenance economy';
      mintBtn.innerHTML = '<span style="font-size:13px">✦</span> mint fork';
      mintBtn.style.cssText = 'position:fixed;bottom:14px;left:130px;z-index:9998;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:3px;font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;cursor:pointer;border:1px solid #c08a3a;color:#c08a3a;background:rgba(10,10,15,.7);box-shadow:0 4px 14px rgba(0,0,0,.4)';
      mintBtn.onmouseover = () => { mintBtn.style.background = '#c08a3a'; mintBtn.style.color = '#0a0a0a'; };
      mintBtn.onmouseout  = () => { mintBtn.style.background = 'rgba(10,10,15,.7)'; mintBtn.style.color = '#c08a3a'; };
      mintBtn.onclick = openMint;
      document.body.appendChild(mintBtn);
    }
    renderAiChip();
    return { version: FALL_KIT_VERSION, mounted: true };
  }

  // ─── Public API ──────────────────────────────────────────────────
  root.FallKit = {
    version: FALL_KIT_VERSION,
    init: init,
    aiTier: aiTier,
    aiComplete: aiComplete,
    loadWebLLM: loadWebLLM,
    openSettings: openSettings,
    closeSettings: closeSettings,
    renderAiChip: renderAiChip,
    helpSection: helpSection,
    meshStart: meshStart,
    meshPost: meshPost,
    notify: notify,
    openMint: openMint,  // v1.2 · launch kcc-mint with this seed prefilled as parent
    MODELS: WEBLLM_MODELS,
    PROVIDERS: T3_PROVIDERS,
    state: STATE,
  };
})(typeof window !== 'undefined' ? window : globalThis);

</script>

  // fall-kit init · auto-mounts a floating AI chip bottom-left
  (function () {
    function go() { if (typeof FallKit !== 'undefined') FallKit.init({ seedName: "fallcliniconboard" }); }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', go);
    else go();
  })();
</script>
<!-- FALL_KIT_END v1 -->
</head>
<body>
<div class="app">
<header>
  <div class="brand">
    <div class="mark">◊</div>
    <div><div class="name">FallClinicOnboard</div></div>
    <div class="seal">v1 · prime 929</div>
  </div>
  <nav class="tabs" id="tabNav"></nav>
  <div class="tools-r">
    <button class="tool-btn" id="tierBadge" onclick="openModal('settings')">T0</button>
    <button class="tool-btn" onclick="openModal('settings')">⚙</button>
  </div>
</header>
<main id="view"></main>
</div>
<div class="modal-bg" id="modal">
  <div class="modal"><h2 id="modalTitle">.</h2><div id="modalBody"></div></div>
</div>
<div class="toast" id="toast">.</div>

<script>
'use strict';
const TOOLNAME='fallcliniconboard',VERSION='1.0.0',PRIME=929,STORE='fallcliniconboard-v1';
const TABS=[{id:'register',label:'register'},{id:'patients',label:'patients'},{id:'firm',label:'practice'},{id:'qa',label:'Q&A'}];

function newPatientRec(){return {
  id:'',ts:0,updatedAt:0,isDemo:false,status:'new',wizardStep:0,
  demographics:{title:'',firstName:'',lastName:'',dob:'',sex:'',gender:'',ethnicity:'',nhsNumber:'',hospitalNumber:'',address:'',postcode:'',phone:'',email:'',nokName:'',nokRelation:'',nokPhone:'',interpreterNeeded:false,interpreterLanguage:'',registeredGP:'',gpPractice:'',gpAddress:''},
  medical:{conditions:[],allergies:[],medications:[],surgeries:'',familyHistory:'',smokingStatus:'never',alcoholUnits:0,substanceUse:'none',disabilities:'',mentalHealth:'',immunisations:''},
  consent:{gdprConsent:false,gdprConsentDate:null,treatmentConsent:false,treatmentConsentDate:null,dataSharing:false,dataSharingOrgs:'',researchConsent:false,photographConsent:false,electronicComms:false,capacityAssessed:false,capacityOutcome:'',gillickAssessed:false,gillickCompetent:false,bestInterestDecision:'',lpa:false,lpaDetails:''},
  safeguarding:{flagged:false,category:'',details:'',referralMade:false,referralDate:null,referralTo:'',riskLevel:'low',childProtectionPlan:false,adultAtRisk:false,domesticAbuse:false,marac:false},
  documents:[],
}}

let state={active:'register',firm:null,patients:[],audit:[],currentPatient:null,wizardStep:0,chat:[],
  settings:{anthropicKey:'',auditChain:true,autoBroadcast:true}};

const $=(s,p=document)=>p.querySelector(s);const $$=(s,p=document)=>Array.from(p.querySelectorAll(s));
const uid=p=>(p||'')+'_'+Math.random().toString(36).slice(2,11);
const now=()=>Date.now();
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dateStr=ts=>{if(!ts)return '—';return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})};
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1900)}
async function sha256(s){const buf=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(STORE,1);r.onupgradeneeded=e=>{const d=e.target.result;['state','audit','patients','firms'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='state'?undefined:'id'})})};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=rej})}
function idbGetAll(s){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([])})}
function idbGet(s,k){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null)})}
function idbPut(s,v,k){return new Promise(res=>{const tx=db.transaction(s,'readwrite');const o=tx.objectStore(s);const q=k!=null?o.put(v,k):o.put(v);q.onsuccess=()=>res(true);q.onerror=()=>res(false)})}

async function loadAll(){if(!db)await openDB();const[firms,patients,auditArr,uiState]=await Promise.all([idbGetAll('firms'),idbGetAll('patients'),idbGetAll('audit'),idbGet('state','ui')]);state.firm=firms[0]||null;state.patients=patients;state.audit=auditArr.sort((a,b)=>a.i-b.i);if(uiState){Object.assign(state,{active:uiState.active||state.active,currentPatient:uiState.currentPatient||null,wizardStep:uiState.wizardStep||0,chat:uiState.chat||[],settings:Object.assign({},state.settings,uiState.settings||{})});}}
async function persistUI(){await idbPut('state',{active:state.active,currentPatient:state.currentPatient,wizardStep:state.wizardStep,chat:state.chat,settings:state.settings},'ui')}
async function auditLog(action,opts={}){if(!state.settings.auditChain)return;const prev=state.audit.length?state.audit[state.audit.length-1]:null;const prevHash=prev?prev.docHash:'';const i=(prev?prev.i:0)+1;const entry={id:uid('au'),i,ts:now(),tool:TOOLNAME,action,reasoning:opts.reasoning||'',configVersion:TOOLNAME+'@'+VERSION,prevHash,docHash:'',payload:opts.payload||{}};entry.docHash=await sha256(JSON.stringify({i,ts:entry.ts,action,prevHash,payload:entry.payload}));state.audit.push(entry);await idbPut('audit',entry)}

let bcClinic,bcSignal;
function initMesh(){try{bcSignal=new BroadcastChannel('fall-signal');bcSignal.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:now()})}catch(e){}try{bcClinic=new BroadcastChannel('fall-clinic');bcClinic.addEventListener('message',async e=>{const m=e.data;if(!m||m.source===TOOLNAME)return;if(m.type==='sync.request'){bcClinic.postMessage({v:1,type:'sync.snapshot',source:TOOLNAME,ts:now(),payload:{patients:state.patients,firm:state.firm}})}});bcClinic.postMessage({v:1,type:'sync.request',ts:now(),source:TOOLNAME})}catch(e){}}
function broadcastUpdate(){try{if(bcClinic)bcClinic.postMessage({v:1,type:'sync.snapshot',source:TOOLNAME,ts:now(),payload:{patients:state.patients,firm:state.firm}})}catch(e){}}

const ALL_STEPS=[
  {id:'demographics',label:'Demographics'},
  {id:'medical',label:'Medical History'},
  {id:'allergies',label:'Allergies & Meds'},
  {id:'consent',label:'Consent & GDPR'},
  {id:'safeguarding',label:'Safeguarding'},
  {id:'documents',label:'Documents'},
];
function getSteps(){return ALL_STEPS}

function render(){renderTabs();const v=$('#view');switch(state.active){case 'register':return renderRegister(v);case 'patients':return renderPatients(v);case 'firm':return renderFirm(v);case 'qa':return renderQA(v);}}
function renderTabs(){$('#tabNav').innerHTML=TABS.map(t=>`<button class="${state.active===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('')}
function switchTab(id){state.active=id;persistUI();render()}

function renderRegister(v){
  const p=state.currentPatient?state.patients.find(x=>x.id===state.currentPatient):null;
  if(!p){v.innerHTML=`<div class="disclaimer"><strong>◊ Regulatory notice:</strong> FallClinicOnboard captures patient registration data under GDPR Article 9 (special category health data). The practice is the data controller. Caldicott Principles apply. This tool does not replace clinical systems (EMIS/SystmOne). Data never leaves this device.</div>
    <div class="section-h"><h2>Patient Registration</h2><div class="actions"><button class="btn brass" onclick="newPatient()">+ New Patient</button></div></div>
    <div class="empty"><h3>Select or create a patient</h3><p>Start a new registration or select from the Patients tab.</p></div>`;return;}
  const steps=getSteps();
  v.innerHTML=`<div class="section-h"><h2>${esc((p.demographics.title+' '+p.demographics.firstName+' '+p.demographics.lastName).trim()||'New Patient')}</h2><div class="sub">${esc(p.demographics.nhsNumber?'NHS '+p.demographics.nhsNumber:p.id.slice(0,10))}</div></div>
  <div class="wizard">
    <div class="wizard-steps">${steps.map((s,i)=>`<div class="ws ${i===state.wizardStep?'active':''} ${i<state.wizardStep?'done':''}" onclick="goStep(${i})">${s.label}</div>`).join('')}</div>
    <div class="card" id="stepContent">${renderStep(p,steps[state.wizardStep])}</div>
    <div style="display:flex;justify-content:space-between">
      <button class="btn ghost" onclick="prevStep()" ${state.wizardStep===0?'disabled':''}>← Back</button>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="saveCurrentPatient()">Save</button>
        ${state.wizardStep<steps.length-1?`<button class="btn brass" onclick="nextStep()">Next →</button>`:`<button class="btn brass" onclick="completeRegistration()">Complete</button>`}
      </div>
    </div>
  </div>`;
}

function renderStep(p,step){
  const d=p.demographics,m=p.medical,c=p.consent,s=p.safeguarding;
  switch(step.id){
    case 'demographics':return `<h3>Demographics</h3>
      <div class="row3"><div class="field"><label>Title</label><select id="wTitle"><option value="">—</option>${['Mr','Mrs','Ms','Miss','Mx','Dr','Prof'].map(t=>`<option ${d.title===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="field"><label>First name</label><input id="wFirst" value="${esc(d.firstName)}"></div><div class="field"><label>Last name</label><input id="wLast" value="${esc(d.lastName)}"></div></div>
      <div class="row3"><div class="field"><label>DOB</label><input type="date" id="wDob" value="${esc(d.dob)}"></div><div class="field"><label>Sex (biological)</label><select id="wSex"><option value="">—</option>${['Male','Female','Intersex'].map(t=>`<option ${d.sex===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="field"><label>Gender</label><input id="wGender" value="${esc(d.gender)}" placeholder="optional"></div></div>
      <div class="row"><div class="field"><label>NHS number</label><input id="wNhs" value="${esc(d.nhsNumber)}" pattern="[0-9]{10}" placeholder="10 digits"></div><div class="field"><label>Hospital number</label><input id="wHosp" value="${esc(d.hospitalNumber)}"></div></div>
      <div class="field"><label>Address</label><input id="wAddr" value="${esc(d.address)}"></div>
      <div class="row"><div class="field"><label>Postcode</label><input id="wPC" value="${esc(d.postcode)}"></div><div class="field"><label>Ethnicity</label><select id="wEth"><option value="">—</option>${['White British','White Irish','White Other','Mixed White/Black Caribbean','Mixed White/Black African','Mixed White/Asian','Mixed Other','Asian Indian','Asian Pakistani','Asian Bangladeshi','Asian Chinese','Asian Other','Black African','Black Caribbean','Black Other','Arab','Other'].map(t=>`<option ${d.ethnicity===t?'selected':''}>${t}</option>`).join('')}</select></div></div>
      <div class="row"><div class="field"><label>Phone</label><input id="wPhone" value="${esc(d.phone)}"></div><div class="field"><label>Email</label><input id="wEmail" value="${esc(d.email)}"></div></div>
      <div class="row3"><div class="field"><label>NOK name</label><input id="wNokN" value="${esc(d.nokName)}"></div><div class="field"><label>NOK relation</label><input id="wNokR" value="${esc(d.nokRelation)}"></div><div class="field"><label>NOK phone</label><input id="wNokP" value="${esc(d.nokPhone)}"></div></div>
      <div class="row"><div class="field"><label style="font-size:11px"><input type="checkbox" id="wInterp" ${d.interpreterNeeded?'checked':''}> Interpreter needed</label></div><div class="field"><label>Language</label><input id="wInterpLang" value="${esc(d.interpreterLanguage)}"></div></div>
      <div class="row"><div class="field"><label>Registered GP</label><input id="wGP" value="${esc(d.registeredGP)}"></div><div class="field"><label>GP practice</label><input id="wGPPrac" value="${esc(d.gpPractice)}"></div></div>`;

    case 'medical':return `<h3>Medical History</h3>
      <div class="field"><label>Current conditions (comma separated)</label><textarea id="wConds" rows="3">${esc(m.conditions.join(', '))}</textarea></div>
      <div class="field"><label>Previous surgeries / procedures</label><textarea id="wSurg" rows="2">${esc(m.surgeries)}</textarea></div>
      <div class="field"><label>Family history</label><textarea id="wFamHx" rows="2">${esc(m.familyHistory)}</textarea></div>
      <div class="row3"><div class="field"><label>Smoking</label><select id="wSmoke"><option value="never" ${m.smokingStatus==='never'?'selected':''}>never</option><option value="ex" ${m.smokingStatus==='ex'?'selected':''}>ex-smoker</option><option value="current" ${m.smokingStatus==='current'?'selected':''}>current</option></select></div><div class="field"><label>Alcohol (units/wk)</label><input type="number" id="wAlc" value="${m.alcoholUnits||0}"></div><div class="field"><label>Substance use</label><select id="wSubst"><option value="none" ${m.substanceUse==='none'?'selected':''}>none</option><option value="recreational" ${m.substanceUse==='recreational'?'selected':''}>recreational</option><option value="dependent" ${m.substanceUse==='dependent'?'selected':''}>dependent</option><option value="in-recovery" ${m.substanceUse==='in-recovery'?'selected':''}>in recovery</option></select></div></div>
      <div class="field"><label>Disabilities / mobility</label><input id="wDisab" value="${esc(m.disabilities)}"></div>
      <div class="field"><label>Mental health</label><input id="wMH" value="${esc(m.mentalHealth)}"></div>
      <div class="field"><label>Immunisations</label><input id="wImmun" value="${esc(m.immunisations)}"></div>`;

    case 'allergies':return `<h3>Allergies & Current Medications</h3>
      <div class="card" style="margin-bottom:12px"><h3>Allergies</h3>
        <ul class="allergy-list" id="allergyList">${(m.allergies||[]).map((a,i)=>`<li><span class="tag ${a.severity==='severe'?'red':a.severity==='moderate'?'amber':'muted'}">${esc(a.severity)}</span> <strong>${esc(a.allergen)}</strong> — ${esc(a.reaction)} <button class="btn sm danger" onclick="removeAllergy(${i})">×</button></li>`).join('')}</ul>
        ${m.allergies.length===0?'<div class="empty">No known allergies (NKDA) — or add below</div>':''}
        <div class="row3" style="margin-top:8px"><div class="field"><label>Allergen</label><input id="aAllergen"></div><div class="field"><label>Reaction</label><input id="aReaction"></div><div class="field"><label>Severity</label><select id="aSev"><option>mild</option><option>moderate</option><option>severe</option></select></div></div>
        <button class="btn sm" onclick="addAllergy()">+ Add allergy</button>
      </div>
      <div class="card"><h3>Current Medications</h3>
        <div class="field"><label>Medications (name, dose, frequency — one per line)</label><textarea id="wMeds" rows="4">${esc(m.medications.join('\n'))}</textarea></div>
      </div>`;

    case 'consent':return `<h3>Consent & GDPR</h3>
      <div class="card" style="margin-bottom:12px"><h3>GDPR Article 9 — Special Category Data</h3>
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wGdpr" ${c.gdprConsent?'checked':''}> Patient consents to processing of health data under GDPR Art.9(2)(h) — healthcare purposes. The practice is data controller.</label></div>
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wDataShare" ${c.dataSharing?'checked':''}> Patient consents to sharing data with: ${esc(c.dataSharingOrgs||'NHS Digital, referral providers')}</label></div>
        <div class="field"><label>Data sharing organisations</label><input id="wShareOrgs" value="${esc(c.dataSharingOrgs)}"></div>
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wResearch" ${c.researchConsent?'checked':''}> Consent to anonymised data use for research</label></div>
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wPhoto" ${c.photographConsent?'checked':''}> Consent to clinical photography</label></div>
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wEcomms" ${c.electronicComms?'checked':''}> Consent to electronic communications (SMS/email appointment reminders)</label></div>
      </div>
      <div class="card" style="margin-bottom:12px"><h3>Treatment Consent</h3>
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wTreatConsent" ${c.treatmentConsent?'checked':''}> Patient gives informed consent to examination and treatment</label></div>
      </div>
      <div class="card"><h3>Capacity & Gillick</h3>
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wCapacity" ${c.capacityAssessed?'checked':''}> Mental Capacity Act 2005 assessment performed</label></div>
        <div class="field"><label>Capacity outcome</label><select id="wCapOut"><option value="">—</option><option ${c.capacityOutcome==='has-capacity'?'selected':''} value="has-capacity">has capacity</option><option ${c.capacityOutcome==='lacks-capacity'?'selected':''} value="lacks-capacity">lacks capacity</option><option ${c.capacityOutcome==='fluctuating'?'selected':''} value="fluctuating">fluctuating capacity</option></select></div>
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wGillick" ${c.gillickAssessed?'checked':''}> Gillick competence assessed (under 16)</label></div>
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wGillickComp" ${c.gillickCompetent?'checked':''}> Gillick competent — can consent independently</label></div>
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wLpa" ${c.lpa?'checked':''}> Lasting Power of Attorney (Health & Welfare) in place</label></div>
        <div class="field"><label>LPA / best interest details</label><textarea id="wLpaDetail" rows="2">${esc(c.lpaDetails)}</textarea></div>
      </div>`;

    case 'safeguarding':return `<h3>Safeguarding</h3>
      <div class="card">
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wSafFlag" ${s.flagged?'checked':''}> Safeguarding concern flagged</label></div>
        <div class="field"><label>Category</label><select id="wSafCat"><option value="">—</option><option ${s.category==='child-neglect'?'selected':''} value="child-neglect">child neglect</option><option ${s.category==='child-abuse'?'selected':''} value="child-abuse">child abuse (physical/emotional/sexual)</option><option ${s.category==='adult-neglect'?'selected':''} value="adult-neglect">adult neglect</option><option ${s.category==='adult-abuse'?'selected':''} value="adult-abuse">adult abuse</option><option ${s.category==='domestic-abuse'?'selected':''} value="domestic-abuse">domestic abuse</option><option ${s.category==='self-neglect'?'selected':''} value="self-neglect">self-neglect</option><option ${s.category==='modern-slavery'?'selected':''} value="modern-slavery">modern slavery</option><option ${s.category==='fgm'?'selected':''} value="fgm">FGM</option><option ${s.category==='prevent'?'selected':''} value="prevent">Prevent (radicalisation)</option><option ${s.category==='other'?'selected':''} value="other">other</option></select></div>
        <div class="field"><label>Details</label><textarea id="wSafDet" rows="3">${esc(s.details)}</textarea></div>
        <div class="field"><label>Risk level</label><select id="wSafRisk"><option ${s.riskLevel==='low'?'selected':''} value="low">low</option><option ${s.riskLevel==='medium'?'selected':''} value="medium">medium</option><option ${s.riskLevel==='high'?'selected':''} value="high">high</option></select></div>
        <div class="field"><label style="font-size:12px"><input type="checkbox" id="wRefMade" ${s.referralMade?'checked':''}> Referral made</label></div>
        <div class="field"><label>Referred to</label><input id="wRefTo" value="${esc(s.referralTo)}"></div>
        <div class="row">
          <div class="field"><label style="font-size:12px"><input type="checkbox" id="wCPP" ${s.childProtectionPlan?'checked':''}> Child Protection Plan</label></div>
          <div class="field"><label style="font-size:12px"><input type="checkbox" id="wAdultRisk" ${s.adultAtRisk?'checked':''}> Adult at Risk</label></div>
        </div>
        <div class="row">
          <div class="field"><label style="font-size:12px"><input type="checkbox" id="wDA" ${s.domesticAbuse?'checked':''}> Domestic abuse</label></div>
          <div class="field"><label style="font-size:12px"><input type="checkbox" id="wMARAC" ${s.marac?'checked':''}> MARAC referral</label></div>
        </div>
      </div>`;

    case 'documents':return `<h3>Documents</h3>
      <div class="field"><label>Upload document</label><input type="file" id="docFile" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"></div>
      <button class="btn sm" onclick="captureDoc()" style="margin-top:6px">Upload & hash</button>
      ${p.documents.length?`<table style="margin-top:12px"><thead><tr><th>Name</th><th>Type</th><th>Hash</th><th>Date</th></tr></thead><tbody>${p.documents.map(d=>`<tr><td>${esc(d.name)}</td><td>${esc(d.type)}</td><td style="font-family:var(--mono);font-size:10px;color:var(--cream-muted)">${esc(d.hash)}</td><td>${dateStr(d.ts)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">No documents uploaded.</div>'}`;
  }
  return '';
}

function collectStep(p,step){
  switch(step.id){
    case 'demographics':{const d=p.demographics;d.title=$('#wTitle')?.value||d.title;d.firstName=$('#wFirst')?.value?.trim()||d.firstName;d.lastName=$('#wLast')?.value?.trim()||d.lastName;d.dob=$('#wDob')?.value||d.dob;d.sex=$('#wSex')?.value||d.sex;d.gender=$('#wGender')?.value?.trim()||d.gender;d.nhsNumber=$('#wNhs')?.value?.trim()||d.nhsNumber;d.hospitalNumber=$('#wHosp')?.value?.trim()||d.hospitalNumber;d.address=$('#wAddr')?.value?.trim()||d.address;d.postcode=$('#wPC')?.value?.trim()||d.postcode;d.ethnicity=$('#wEth')?.value||d.ethnicity;d.phone=$('#wPhone')?.value?.trim()||d.phone;d.email=$('#wEmail')?.value?.trim()||d.email;d.nokName=$('#wNokN')?.value?.trim()||d.nokName;d.nokRelation=$('#wNokR')?.value?.trim()||d.nokRelation;d.nokPhone=$('#wNokP')?.value?.trim()||d.nokPhone;d.interpreterNeeded=$('#wInterp')?.checked||false;d.interpreterLanguage=$('#wInterpLang')?.value?.trim()||d.interpreterLanguage;d.registeredGP=$('#wGP')?.value?.trim()||d.registeredGP;d.gpPractice=$('#wGPPrac')?.value?.trim()||d.gpPractice;break;}
    case 'medical':{const m=p.medical;m.conditions=($('#wConds')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);m.surgeries=$('#wSurg')?.value?.trim()||m.surgeries;m.familyHistory=$('#wFamHx')?.value?.trim()||m.familyHistory;m.smokingStatus=$('#wSmoke')?.value||m.smokingStatus;m.alcoholUnits=+$('#wAlc')?.value||0;m.substanceUse=$('#wSubst')?.value||m.substanceUse;m.disabilities=$('#wDisab')?.value?.trim()||m.disabilities;m.mentalHealth=$('#wMH')?.value?.trim()||m.mentalHealth;m.immunisations=$('#wImmun')?.value?.trim()||m.immunisations;break;}
    case 'allergies':{const m=p.medical;m.medications=($('#wMeds')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);break;}
    case 'consent':{const c=p.consent;c.gdprConsent=$('#wGdpr')?.checked||false;if(c.gdprConsent&&!c.gdprConsentDate)c.gdprConsentDate=now();c.treatmentConsent=$('#wTreatConsent')?.checked||false;if(c.treatmentConsent&&!c.treatmentConsentDate)c.treatmentConsentDate=now();c.dataSharing=$('#wDataShare')?.checked||false;c.dataSharingOrgs=$('#wShareOrgs')?.value?.trim()||c.dataSharingOrgs;c.researchConsent=$('#wResearch')?.checked||false;c.photographConsent=$('#wPhoto')?.checked||false;c.electronicComms=$('#wEcomms')?.checked||false;c.capacityAssessed=$('#wCapacity')?.checked||false;c.capacityOutcome=$('#wCapOut')?.value||c.capacityOutcome;c.gillickAssessed=$('#wGillick')?.checked||false;c.gillickCompetent=$('#wGillickComp')?.checked||false;c.lpa=$('#wLpa')?.checked||false;c.lpaDetails=$('#wLpaDetail')?.value?.trim()||c.lpaDetails;break;}
    case 'safeguarding':{const sg=p.safeguarding;sg.flagged=$('#wSafFlag')?.checked||false;sg.category=$('#wSafCat')?.value||sg.category;sg.details=$('#wSafDet')?.value?.trim()||sg.details;sg.riskLevel=$('#wSafRisk')?.value||sg.riskLevel;sg.referralMade=$('#wRefMade')?.checked||false;sg.referralTo=$('#wRefTo')?.value?.trim()||sg.referralTo;sg.childProtectionPlan=$('#wCPP')?.checked||false;sg.adultAtRisk=$('#wAdultRisk')?.checked||false;sg.domesticAbuse=$('#wDA')?.checked||false;sg.marac=$('#wMARAC')?.checked||false;break;}
  }
}

function goStep(i){const p=state.patients.find(x=>x.id===state.currentPatient);if(p)collectStep(p,getSteps()[state.wizardStep]);state.wizardStep=i;persistUI();render()}
function nextStep(){const p=state.patients.find(x=>x.id===state.currentPatient);if(p)collectStep(p,getSteps()[state.wizardStep]);state.wizardStep=Math.min(state.wizardStep+1,getSteps().length-1);persistUI();render()}
function prevStep(){const p=state.patients.find(x=>x.id===state.currentPatient);if(p)collectStep(p,getSteps()[state.wizardStep]);state.wizardStep=Math.max(state.wizardStep-1,0);persistUI();render()}

async function saveCurrentPatient(){const p=state.patients.find(x=>x.id===state.currentPatient);if(!p){toast('No patient');return}collectStep(p,getSteps()[state.wizardStep]);p.updatedAt=now();await idbPut('patients',p);await auditLog('patient.saved',{reasoning:'wizard save',payload:{patientId:p.id}});toast('Saved');broadcastUpdate();render()}

async function newPatient(){const p=newPatientRec();p.id=uid('pt');p.ts=now();p.updatedAt=now();state.patients.push(p);state.currentPatient=p.id;state.wizardStep=0;await idbPut('patients',p);await auditLog('patient.created',{payload:{patientId:p.id}});persistUI();render()}

function addAllergy(){const allergen=$('#aAllergen')?.value?.trim();const reaction=$('#aReaction')?.value?.trim();const severity=$('#aSev')?.value||'mild';if(!allergen)return;const p=state.patients.find(x=>x.id===state.currentPatient);if(!p)return;p.medical.allergies.push({allergen,reaction,severity});render()}
function removeAllergy(i){const p=state.patients.find(x=>x.id===state.currentPatient);if(!p)return;p.medical.allergies.splice(i,1);render()}

async function captureDoc(){const inp=$('#docFile');if(!inp||!inp.files.length)return;const f=inp.files[0];const buf=await f.arrayBuffer();const hashBuf=await crypto.subtle.digest('SHA-256',buf);const hash=Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);const p=state.patients.find(x=>x.id===state.currentPatient);if(!p)return;p.documents.push({name:f.name,type:f.type,size:f.size,hash,ts:now()});await idbPut('patients',p);await auditLog('document.captured',{payload:{patientId:p.id,hash}});toast('Document hashed');render()}

async function completeRegistration(){const p=state.patients.find(x=>x.id===state.currentPatient);if(!p)return;collectStep(p,getSteps()[state.wizardStep]);p.status='complete';p.updatedAt=now();await idbPut('patients',p);await auditLog('patient.completed',{payload:{patientId:p.id}});toast('Registration complete');broadcastUpdate();render()}

function renderPatients(v){
  const pts=state.patients.sort((a,b)=>b.updatedAt-a.updatedAt);
  v.innerHTML=`<div class="section-h"><h2>Patients</h2><div class="sub">${pts.length}</div><div class="actions"><button class="btn brass" onclick="newPatient()">+ New</button></div></div>
  ${pts.length?`<table><thead><tr><th>Name</th><th>NHS</th><th>DOB</th><th>Status</th><th>Safeguarding</th></tr></thead><tbody>${pts.map(p=>{const name=(p.demographics.title+' '+p.demographics.firstName+' '+p.demographics.lastName).trim()||p.id.slice(0,10);return `<tr style="cursor:pointer" onclick="selectPatient('${p.id}')"><td>${esc(name)}</td><td style="font-family:var(--mono);font-size:12px">${esc(p.demographics.nhsNumber||'—')}</td><td>${esc(p.demographics.dob||'—')}</td><td><span class="tag ${p.status==='complete'?'green':p.status==='new'?'muted':'amber'}">${p.status}</span></td><td>${p.safeguarding.flagged?`<span class="tag red">${esc(p.safeguarding.riskLevel)}</span>`:'—'}</td></tr>`}).join('')}</tbody></table>`:'<div class="empty">No patients registered.</div>'}`;
}
function selectPatient(id){state.currentPatient=id;state.wizardStep=0;state.active='register';persistUI();render()}

function renderFirm(v){const f=state.firm||{};
  v.innerHTML=`<div class="section-h"><h2>Practice Setup</h2></div><div class="card" style="max-width:620px">
    <div class="row"><div class="field"><label>Practice name</label><input id="fName" value="${esc(f.name||'')}"></div><div class="field"><label>Email</label><input id="fEmail" value="${esc(f.email||'')}"></div></div>
    <div class="field"><label>Address</label><input id="fAddr" value="${esc(f.address||'')}"></div>
    <div class="row"><div class="field"><label>Phone</label><input id="fPhone" value="${esc(f.phone||'')}"></div><div class="field"><label>CQC registration</label><input id="fCqc" value="${esc(f.cqcRegistration||'')}"></div></div>
    <div class="row"><div class="field"><label>ICO registration (DPA 2018)</label><input id="fIco" value="${esc(f.icoRegistration||'')}"></div><div class="field"><label>Caldicott Guardian</label><input id="fCald" value="${esc(f.caldicottGuardian||'')}"></div></div>
    <button class="btn brass" onclick="saveFirmForm()" style="margin-top:8px">Save</button>
  </div>`;
}
async function saveFirmForm(){const f=state.firm||{id:uid('fi'),ts:now()};f.name=$('#fName').value.trim();f.email=$('#fEmail').value.trim();f.address=$('#fAddr').value.trim();f.phone=$('#fPhone').value.trim();f.cqcRegistration=$('#fCqc').value.trim();f.icoRegistration=$('#fIco').value.trim();f.caldicottGuardian=$('#fCald').value.trim();f.updatedAt=now();state.firm=f;await idbPut('firms',f);await auditLog('firm.saved');toast('Saved');render()}

const T0_QA=[
  {q:/gdpr|data protection|article.?9|special category/i,a:'GDPR Article 9 governs processing of special category data including health data. Lawful basis for healthcare: Art.9(2)(h) — necessary for provision of health care under the responsibility of a health professional. Data controller (the practice) must maintain records of processing (Art.30), conduct DPIAs for high-risk processing, register with the ICO, appoint a DPO if large-scale processing. UK GDPR (DPA 2018) supplements EU GDPR post-Brexit.'},
  {q:/caldicott|principle/i,a:'Caldicott Principles (updated 2023, 8 principles): 1. Justify the purpose 2. Don\'t use patient data unless necessary 3. Use minimum necessary 4. Access on need-to-know basis 5. Everyone has duty of confidentiality 6. Comply with the law 7. Duty to share can be as important as duty to protect 8. Inform patients about use of their data. Every NHS/social care org must have a Caldicott Guardian.'},
  {q:/consent|gillick|capacity|mca/i,a:'Consent framework: Adults (16+) presumed to have capacity (Mental Capacity Act 2005). Capacity is decision-specific and time-specific. 2-stage test: (1) impairment of mind/brain, (2) unable to understand/retain/use/communicate. Under 16: Gillick competence — can consent if sufficient understanding and intelligence. Fraser guidelines for contraception. Best interest decisions for those lacking capacity. Lasting Power of Attorney (Health & Welfare) allows attorney to consent.'},
  {q:/safeguard|child|adult|prevent|fgm/i,a:'Safeguarding duties: Children Act 1989/2004 — duty to safeguard and promote welfare. Care Act 2014 s.42 — duty to make enquiries for adults at risk. Mandatory reporting: FGM (Serious Crime Act 2015 s.74), Prevent (Counter-Terrorism & Security Act 2015), child protection (Working Together 2018). MARAC referral for domestic abuse. Record, refer to local authority MASH/safeguarding team, document decisions.'},
  {q:/nhs.?number|pds|spine/i,a:'NHS number is the unique 10-digit patient identifier used across all NHS services. Format: 3-digit blocks (e.g. 943 476 5919). Validated by Modulus 11 check digit. PDS (Personal Demographics Service) on the NHS Spine is the master patient index. Practices should verify NHS number at registration. Hospital number is the local trust identifier.'},
  {q:/allergy|adverse|reaction/i,a:'Allergy recording: use structured coding (dm+d / SNOMED CT). Severity: mild (localised reaction), moderate (systemic but not life-threatening), severe (anaphylaxis risk). Record: allergen, reaction type, severity, date of onset. Drug allergies must be recorded in clinical system and visible at prescribing. NKDA (No Known Drug Allergies) should be explicitly recorded.'},
  {q:/cqc|registration|inspection/i,a:'Care Quality Commission (CQC) regulates all health and social care providers in England. Registration required before providing regulated activities. 5 key questions: Safe, Effective, Caring, Responsive, Well-led. Ratings: Outstanding, Good, Requires Improvement, Inadequate. Inspection framework includes patient safety, clinical governance, safeguarding, medicines management, infection control.'},
  {q:/interpreter|language|accessible/i,a:'Equality Act 2010 requires reasonable adjustments. NHS Constitution: right to be communicated with in a way you can understand. NHS Accessible Information Standard: identify, record, flag, share, meet communication needs. Professional interpreters required for clinical consultations — family members should not interpret for clinical discussions. Language Line / in-person interpreters.'},
  {q:/medication|prescrib|drug/i,a:'Current medications should be recorded at registration with: drug name (generic/brand), dose, frequency, route, prescriber, indication. Medication reconciliation at transitions of care (NICE NG5). Check for interactions and allergies. Over-the-counter medications and supplements should be recorded. Summary Care Record (SCR) contains current medications, allergies, and adverse reactions.'},
  {q:/record|retention|destroy/i,a:'NHS records retention: GP records — 10 years after death or after patient leaves practice (whichever longer). Hospital records — 8 years after last attendance (adults), until 25th birthday or 8 years after death (children). Mental health — 20 years after last contact. Maternity — 25 years. Records must be destroyed confidentially. NHS Digital Data Security and Protection Toolkit applies.'},
];
function askT0(q){for(const r of T0_QA){if(r.q.test(q))return {answer:r.a,source:'T0 · UK healthcare rules'};}return null}
async function askT3(q){if(!state.settings.anthropicKey)return null;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':state.settings.anthropicKey,'anthropic-version':'2023-06-01','content-type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:'You are a UK healthcare clinic operations expert. CQC, GDPR, safeguarding, consent, NHS. Concise.\n\n'+q}]})});if(!res.ok)return null;const j=await res.json();return {answer:j.content?.[0]?.text,source:'T3 · Anthropic'}}catch(e){return null}}

function renderQA(v){v.innerHTML=`<div class="section-h"><h2>Q & A</h2><div class="sub">T0 + T3 BYOK</div></div><div class="card" style="max-width:780px"><div class="chat" id="chatBox">${(state.chat||[]).map(m=>`<div class="msg ${m.role}">${esc(m.text)}${m.source?`<div class="src">${esc(m.source)}</div>`:''}</div>`).join('')}</div><div class="chat-input"><input id="chatIn" placeholder="Ask… 'GDPR health data?' · 'Gillick competence?' · 'Safeguarding duties?'" onkeydown="if(event.key==='Enter')askQuestion()"><button class="btn brass" onclick="askQuestion()">Ask</button></div></div>`;const box=$('#chatBox');if(box)box.scrollTop=box.scrollHeight}
async function askQuestion(){const inp=$('#chatIn');if(!inp)return;const q=inp.value.trim();if(!q)return;inp.value='';if(!state.chat)state.chat=[];state.chat.push({role:'user',text:q});render();let r=askT0(q);if(!r)r=await askT3(q);state.chat.push(r?{role:'bot',text:r.answer,source:r.source}:{role:'bot',text:'No T0 match. Add BYOK key in Settings for T3.',source:'system'});persistUI();render()}

function openModal(type){const modal=$('#modal');const title=$('#modalTitle');const body=$('#modalBody');modal.classList.add('open');
  if(type==='settings'){title.textContent='Settings';body.innerHTML=`<div class="field"><label>Anthropic key (T3)</label><input type="password" id="sKey" value="${esc(state.settings.anthropicKey||'')}"></div><div style="margin:10px 0"><label style="font-size:12px"><input type="checkbox" id="sAudit" ${state.settings.auditChain?'checked':''}> Audit chain</label></div><div class="actions"><button class="btn ghost sm" onclick="exportAll()">Export</button><button class="btn ghost sm" onclick="importAll()">Import</button><button class="btn danger sm" onclick="wipeAll()">Wipe</button><button class="btn brass" onclick="saveSettings()">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`}}
function closeModal(){$('#modal').classList.remove('open')}
function saveSettings(){state.settings.anthropicKey=$('#sKey').value.trim();state.settings.auditChain=$('#sAudit').checked;$('#tierBadge').textContent=state.settings.anthropicKey?'T3':'T0';persistUI();closeModal();toast('Saved');render()}
function exportAll(){const d={tool:TOOLNAME,v:VERSION,ts:now(),firm:state.firm,patients:state.patients};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='fallcliniconboard-export.json';a.click();URL.revokeObjectURL(u);toast('Exported')}
function importAll(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async()=>{const f=inp.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(d.firm){state.firm=d.firm;await idbPut('firms',d.firm)}if(Array.isArray(d.patients))for(const p of d.patients){state.patients.push(p);await idbPut('patients',p)}persistUI();toast('Imported');render()}catch(e){toast('Failed')}};inp.click()}
async function wipeAll(){if(!confirm('Wipe ALL data?'))return;for(const s of['patients','firms','audit','state']){const tx=db.transaction(s,'readwrite');tx.objectStore(s).clear();await new Promise(r=>{tx.oncomplete=r})}location.reload()}

async function seedDemo(){if(state.patients.length||state.firm)return;
  const firm={id:uid('fi'),name:'Demo Medical Centre',address:'1 Harley Street, London W1G 9QD',email:'reception@democlinic.nhs.uk',phone:'020 7123 4567',cqcRegistration:'CQC-1-234567890',icoRegistration:'ZA123456',caldicottGuardian:'Dr Sarah Williams',updatedAt:now(),isDemo:true};
  state.firm=firm;await idbPut('firms',firm);

  const p1=newPatientRec();p1.id=uid('pt');p1.ts=now();p1.updatedAt=now();p1.status='complete';p1.isDemo=true;
  Object.assign(p1.demographics,{title:'Mrs',firstName:'Margaret',lastName:'Thompson',dob:'1952-03-14',sex:'Female',nhsNumber:'9434765919',address:'42 Oak Lane, London N1 3RT',postcode:'N1 3RT',phone:'07700 900123',email:'m.thompson@email.co.uk',nokName:'John Thompson',nokRelation:'Husband',nokPhone:'07700 900124',registeredGP:'Dr A. Patel',gpPractice:'The Surgery'});
  Object.assign(p1.medical,{conditions:['Type 2 diabetes','Hypertension','Osteoarthritis'],allergies:[{allergen:'Penicillin',reaction:'Rash and swelling',severity:'moderate'},{allergen:'Ibuprofen',reaction:'GI bleeding',severity:'severe'}],medications:['Metformin 500mg BD','Amlodipine 5mg OD','Paracetamol 1g QDS PRN'],smokingStatus:'ex',alcoholUnits:6,familyHistory:'Father: MI age 62. Mother: breast cancer age 71.'});
  Object.assign(p1.consent,{gdprConsent:true,gdprConsentDate:now()-90*86400000,treatmentConsent:true,treatmentConsentDate:now()-90*86400000,dataSharing:true,dataSharingOrgs:'NHS Digital, local hospital trust',electronicComms:true});
  state.patients.push(p1);await idbPut('patients',p1);

  const p2=newPatientRec();p2.id=uid('pt');p2.ts=now();p2.updatedAt=now();p2.status='new';p2.isDemo=true;
  Object.assign(p2.demographics,{title:'Mr',firstName:'Amir',lastName:'Hassan',dob:'1988-07-22',sex:'Male',nhsNumber:'',address:'15 Elm Road, London E2 7QP',postcode:'E2 7QP',phone:'07700 900456',email:'a.hassan@email.co.uk',interpreterNeeded:true,interpreterLanguage:'Arabic'});
  state.patients.push(p2);await idbPut('patients',p2);
  await auditLog('demo.seeded',{reasoning:'first boot'});await persistUI();
}

(async function boot(){try{await openDB();await loadAll();await seedDemo();initMesh();$('#tierBadge').textContent=state.settings.anthropicKey?'T3':'T0';render()}catch(e){console.error('[fallcliniconboard] boot error:',e);document.getElementById('view').innerHTML='<div class="empty"><h3>Boot error</h3><p>'+esc(e.message)+'</p></div>'}})();
</script>
</body>
